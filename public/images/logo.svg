<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" width="100%" height="100%">
  <!-- Stylized Gosai Red Emblem -->
  <g transform="translate(40, 20)">
    <!-- Top wing of the emblem -->
    <path d="M 50 140 
             C 100 80, 260 80, 310 110 
             C 270 125, 200 125, 170 140 
             C 210 135, 290 145, 305 160 
             C 220 185, 110 185, 50 140 Z" 
          fill="#FF1E27" />
    
    <!-- Bottom wing of the emblem -->
    <path d="M 95 155 
             C 110 140, 190 130, 230 140 
             C 200 155, 130 155, 90 170 
             C 140 195, 250 195, 300 230 
             C 250 260, 90 260, 40 200 
             C 50 180, 80 165, 95 155 Z" 
          fill="#FF1E27" />
  </g>

  <!-- Typography "GOSAI SPORTS" and "GOSAI INDUSTRIES" -->
  <text x="200" y="355" 
        font-family="'Outfit', 'Inter', 'Helvetica Neue', sans-serif" 
        font-size="64" 
        font-weight="900" 
        font-style="italic" 
        fill="#FFFFFF" 
        text-anchor="middle" 
        letter-spacing="1">
    GOSAI
  </text>
  
  <text x="200" y="395" 
        font-family="'Outfit', 'Inter', 'Helvetica Neue', sans-serif" 
        font-size="28" 
        font-weight="900" 
        font-style="italic" 
        fill="#FF1E27" 
        text-anchor="middle" 
        letter-spacing="4">
    SPORTS
  </text>
  
  <text x="200" y="425" 
        font-family="'Outfit', 'Inter', 'Helvetica Neue', sans-serif" 
        font-size="11" 
        font-weight="700" 
        fill="#9E9EAE" 
        text-anchor="middle" 
        letter-spacing="3">
    GOSAI INDUSTRIES
  </text>
</svg>
